name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          buildozer android clean
          buildozer android debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
